Taskmaster Netlify Deployment Manifest
​Optimized for SPA (Single Page Application) behavior
​[build]
publish = "."
​[[redirects]]
from = "/*"
to = "/index.html"
status = 200
​[[headers]]
for = "/*"
[headers.values]
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Content-Security-Policy = "default-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://fonts.googleapis.com https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; img-src 'self' data:; connect-src 'self' *; media-src 'self' blob: *;"
cache-control = "max-age=0, no-cache, no-store, must-revalidate"
