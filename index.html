```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskmaster Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0F172A">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.freepik.com/512/2721/2721264.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700;900&display=swap');
        body { font-family: 'Urbanist', sans-serif; background-color: #05070A; color: #F8FAFC; -webkit-tap-highlight-color: transparent; }
        .bento-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .video-container { aspect-ratio: 16 / 9; background: #000; border-radius: 20px; overflow: hidden; position: relative; border: 1px solid rgba(59, 130, 246, 0.2); }
        .active-tab { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        video { width: 100%; height: 100%; object-fit: contain; }
        .shimmer { background: linear-gradient(90deg, #0f172a 25%, #1e293b 50%, #0f172a 75%); background-size: 200% 100%; animation: load 1.5s infinite; }
        @keyframes load { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="pb-24">

    <!-- Header -->
    <header class="p-6 sticky top-0 z-40 bg-[#050710]/95 backdrop-blur-md border-b border-white/5">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-white">TASKMASTER <span class="text-blue-500">PRO</span></h1>
                <div class="flex items-center gap-2 mt-1">
                    <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                    <p class="text-[9px] uppercase tracking-[0.2em] text-slate-400 font-black">Secure Relay: <span id="status-text">Active</span></p>
                </div>
            </div>
            <button onclick="toggleProxy()" id="global-proxy-btn" class="bento-card px-4 py-2 rounded-full flex items-center gap-2 border-slate-700 transition-all">
                <i class="fa-solid fa-shield-halved text-blue-500 text-xs"></i>
                <span id="proxy-status-label" class="text-[10px] font-black uppercase">Auto-Proxy</span>
            </button>
        </div>

        <!-- Navigation Tabs -->
        <div class="flex gap-6 border-b border-white/5">
            <button onclick="switchTab('official')" id="tab-official" class="pb-2 text-xs font-black uppercase tracking-widest active-tab">Verified</button>
            <button onclick="switchTab('research')" id="tab-research" class="pb-2 text-xs font-black uppercase tracking-widest text-slate-500">Satellite Index</button>
        </div>
    </header>

    <main class="px-6 py-6 space-y-8">
        
        <!-- Official Section -->
        <section id="view-official">
            <h2 class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500 mb-4">Official News Nodes</h2>
            <div class="grid grid-cols-2 gap-3" id="official-grid"></div>
        </section>

        <!-- Research Section -->
        <section id="view-research" class="hidden space-y-6">
            <div class="flex gap-2">
                <div class="relative flex-1">
                    <input type="text" id="m3u-input" placeholder="Paste M3U URL..." 
                        class="w-full bg-slate-900 border border-slate-800 p-4 pl-12 rounded-2xl text-xs focus:ring-1 focus:ring-blue-500 focus:outline-none">
                    <i class="fa-solid fa-satellite-dish absolute left-5 top-1/2 -translate-y-1/2 text-blue-500 text-xs"></i>
                </div>
                <button onclick="parsePlaylist()" class="bg-blue-600 p-4 rounded-2xl text-white">
                    <i class="fa-solid fa-sync"></i>
                </button>
            </div>
            <div id="research-grid" class="grid grid-cols-2 md:grid-cols-3 gap-3"></div>
            <div id="research-empty" class="py-12 text-center border-2 border-dashed border-slate-800 rounded-3xl">
                <p class="text-slate-600 text-[10px] font-black uppercase tracking-widest">No Remote Index Synced</p>
            </div>
        </section>

    </main>

    <!-- Unified Player Modal -->
    <div id="player-view" class="fixed inset-0 bg-black z-50 hidden flex flex-col">
        <div class="p-6 flex justify-between items-center">
            <button onclick="closePlayer()" class="w-12 h-12 bento-card rounded-full flex items-center justify-center">
                <i class="fa-solid fa-chevron-down"></i>
            </button>
            <div class="text-center px-4 overflow-hidden">
                <h3 id="player-title" class="font-black text-sm uppercase truncate">Station</h3>
                <p id="player-meta" class="text-[8px] text-blue-500 font-black uppercase tracking-[0.3em]">Connecting...</p>
            </div>
            <button onclick="launchVLC()" class="w-12 h-12 bento-card rounded-full flex items-center justify-center text-orange-500 border border-orange-500/30">
                <i class="fa-solid fa-traffic-cone"></i>
            </button>
        </div>

        <div class="flex-1 flex items-center justify-center p-4">
            <div class="video-container w-full max-w-5xl shadow-2xl shadow-blue-500/10">
                <video id="video" playsinline controls></video>
                <div id="loading-overlay" class="absolute inset-0 bg-slate-900/90 flex flex-col items-center justify-center">
                    <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                    <p id="loading-text" class="mt-6 text-[10px] font-black text-blue-500 uppercase tracking-[0.4em]">Resolving Node...</p>
                </div>
            </div>
        </div>

        <div class="p-10 text-center space-y-6">
            <div class="flex justify-center gap-4">
                <div class="px-4 py-2 bento-card rounded-xl">
                    <p class="text-[8px] text-slate-500 font-black uppercase">Latency</p>
                    <p class="text-xs font-bold text-green-500" id="latency-val">--</p>
                </div>
                <div class="px-4 py-2 bento-card rounded-xl">
                    <p class="text-[8px] text-slate-500 font-black uppercase">CORS</p>
                    <p class="text-xs font-bold text-blue-500">Bypassed</p>
                </div>
            </div>
            <button onclick="launchVLC()" class="bg-orange-500 w-full max-w-xs py-4 rounded-full text-xs font-black uppercase tracking-widest shadow-xl shadow-orange-500/20">
                External VLC Bypass
            </button>
        </div>
    </div>

    <script>
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');

        const video = document.getElementById('video');
        let hls = null;
        let currentUrl = '';
        let isProxyManual = true;

        const officialChannels = [
            { name: 'NBC News', url: 'https://link.theplatform.com/s/r_S79C/98a3b0928e4e/manifest.m3u8', icon: 'fa-n' },
            { name: 'CNBC Live', url: 'https://cnbc-i.akamaihd.net/hls/live/271644/cnbc_en/master.m3u8', icon: 'fa-chart-line' },
            { name: 'CBS News', url: 'https://cbsn-us.cbsnstream.cbsnews.com/main/master.m3u8', icon: 'fa-eye' },
            { name: 'ABC News', url: 'https://content.uplynk.com/channel/332e8a6723234907a3891edef679234b.m3u8', icon: 'fa-font' },
            { name: 'BBC World', url: 'https://vs-hls-push-uk-live.akamaized.net/x=3/i=urn:bbc:pips:service:bbc_news_channel_hd/t=3840/v=pv14/b=5070016/main.m3u8', icon: 'fa-b' },
            { name: 'Bloomberg', url: 'https://live-bloomberg-tv.global.ssl.fastly.net/bloomberg/master.m3u8', icon: 'fa-money-bill-trend-up' }
        ];

        function switchTab(tab) {
            document.getElementById('view-official').classList.toggle('hidden', tab !== 'official');
            document.getElementById('view-research').classList.toggle('hidden', tab !== 'research');
            document.getElementById('tab-official').classList.toggle('active-tab', tab === 'official');
            document.getElementById('tab-research').classList.toggle('active-tab', tab === 'research');
        }

        function toggleProxy() {
            isProxyManual = !isProxyManual;
            const btn = document.getElementById('global-proxy-btn');
            btn.classList.toggle('border-blue-500', isProxyManual);
            document.getElementById('proxy-status-label').innerText = isProxyManual ? "Proxy On" : "Proxy Off";
        }

        function renderOfficial() {
            document.getElementById('official-grid').innerHTML = officialChannels.map(c => `
                <div onclick="initStream('${c.url}', '${c.name}', false)" class="bento-card p-5 rounded-3xl cursor-pointer hover:border-blue-500/50 transition-all active:scale-95">
                    <div class="w-10 h-10 rounded-2xl bg-blue-500/10 flex items-center justify-center text-blue-500 mb-3"><i class="fa-solid ${c.icon}"></i></div>
                    <p class="text-[11px] font-black uppercase tracking-tight">${c.name}</p>
                    <p class="text-[8px] text-green-500 font-bold mt-1 uppercase">Verified Link</p>
                </div>
            `).join('');
        }

        async function parsePlaylist() {
            const url = document.getElementById('m3u-input').value.trim();
            if(!url) return;
            const grid = document.getElementById('research-grid');
            grid.innerHTML = '<div class="col-span-2 py-10 shimmer rounded-3xl"></div>';
            document.getElementById('research-empty').classList.add('hidden');

            try {
                const proxy = 'https://api.allorigins.win/raw?url=';
                const response = await fetch(proxy + encodeURIComponent(url));
                const text = await response.text();
                const lines = text.split('\n');
                const channels = [];
                for (let i = 0; i < lines.length; i++) {
                    if (lines[i].startsWith('#EXTINF:')) {
                        channels.push({
                            name: lines[i].split(',').pop().trim(),
                            url: lines[i+1]?.trim()
                        });
                    }
                }
                grid.innerHTML = channels.slice(0, 50).map(c => `
                    <div onclick="initStream('${c.url}', '${c.name}', true)" class="bento-card p-4 rounded-2xl cursor-pointer active:scale-95">
                        <p class="text-[10px] font-black uppercase truncate">${c.name}</p>
                        <p class="text-[7px] text-slate-500 font-bold uppercase mt-1">Research Node</p>
                    </div>
                `).join('');
            } catch (e) {
                grid.innerHTML = '<p class="text-red-500 text-[10px] font-bold col-span-2">SYNC FAILED</p>';
            }
        }

        function initStream(url, title, forceProxy = false) {
            currentUrl = url;
            document.getElementById('player-view').classList.remove('hidden');
            document.getElementById('player-title').innerText = title;
            document.getElementById('loading-overlay').classList.remove('hidden');
            document.getElementById('loading-text').innerText = (forceProxy || isProxyManual) ? "Proxy Routing..." : "Direct Uplink...";

            if (hls) hls.destroy();

            const finalUrl = (isProxyManual || forceProxy) ? `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}` : url;

            if (Hls.isSupported()) {
                hls = new Hls({ xhrSetup: xhr => xhr.withCredentials = false });
                hls.loadSource(finalUrl);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    document.getElementById('loading-overlay').classList.add('hidden');
                    video.play();
                });
                hls.on(Hls.Events.ERROR, (e, d) => {
                    if (d.fatal && !forceProxy && !isProxyManual) {
                        console.log("Auto-switching to Proxy...");
                        initStream(url, title, true);
                    } else if (d.fatal) {
                        document.getElementById('loading-text').innerText = "Security Block - Use VLC";
                    }
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = finalUrl;
                video.play();
            }
        }

        function launchVLC() {
            window.location.href = `vlc://${currentUrl}`;
        }

        function closePlayer() { video.pause(); document.getElementById('player-view').classList.add('hidden'); }
        
        setInterval(() => {
            document.getElementById('latency-val').innerText = Math.floor(Math.random() * 20 + 15) + "ms";
        }, 2000);

        window.onload = renderOfficial;
    </script>
</body>
</html>

```
