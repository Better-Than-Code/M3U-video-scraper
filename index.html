    <script>
        /**
         * PRODUCTION CONFIG
         * 1. Deploy worker.js to Cloudflare
         * 2. Replace PROXY_URL with your .workers.dev address
         */
        const PROXY_URL = "https://m3uplayer.earngameapps.workers.dev/";

        const video = document.getElementById('video');
        const logs = document.getElementById('log-container');
        let hls = null;

        const NODES = [
            { name: "WJXT News4JAX", url: "https://d2e1asnsl7br7b.cloudfront.net/7.7.8/out/v1/4984f4f780864380a030062a7d656041/index.m3u8" },
            { name: "Action News Jax", url: "https://cmg-jax-wfox.akamaized.net/hls/live/2017351/wfox/master.m3u8" },
            { name: "First Coast News", url: "https://vcloud-670-349.live.webcaster.pro/stream/playlist.m3u8" },
            { name: "Diagnostics (Mux)", url: "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" }
        ];

        function log(msg, color = 'slate-500') {
            const time = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const div = document.createElement('div');
            div.className = `log-line text-${color}`;
            div.innerHTML = `<span><span class="opacity-30 mr-2">${time}</span> ${msg}</span>`;
            logs.prepend(div);
        }

        function unmuteVideo() {
            video.muted = false;
            document.getElementById('unmute-tip').classList.add('opacity-0', 'pointer-events-none');
        }

        async function mountNode(node, btn) {
            document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            document.getElementById('node-name').innerText = node.name;
            document.getElementById('status-text').innerText = "Establishing Stealth Tunnel...";
            document.getElementById('sync-dot').className = "w-2 h-2 bg-blue-500 animate-pulse";
            document.getElementById('status-icon').className = "w-16 h-16 bg-blue-600/20 text-blue-400 rounded-3xl flex items-center justify-center border border-blue-500/20 animate-pulse";

            if (hls) hls.destroy();
            log(`Linking Node: ${node.name}`, 'blue-400');

            const entryPoint = `${PROXY_URL}?url=${encodeURIComponent(node.url)}`;

            if (Hls.isSupported()) {
                hls = new Hls({
                    xhrSetup: (xhr, url) => {
                        // RECURSIVE RESOLVER: Ensures segments inherit the parent node's base URL
                        let finalUrl = url;
                        if (!url.startsWith('http')) {
                            const base = node.url.substring(0, node.url.lastIndexOf('/') + 1);
                            finalUrl = new URL(url, base).href;
                        }
                        xhr.open('GET', `${PROXY_URL}?url=${encodeURIComponent(finalUrl)}`, true);
                    },
                    manifestLoadingMaxRetry: 5,
                    manifestLoadingRetryDelay: 1000,
                    levelLoadingMaxRetry: 5
                });

                hls.loadSource(entryPoint);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    log(`Handshake Verified. Tunnel Secure.`, 'green-400');
                    video.muted = true;
                    video.play().catch(() => {
                        document.getElementById('unmute-tip').classList.remove('opacity-0', 'pointer-events-none');
                    });
                    document.getElementById('status-text').innerText = "Mesh Active / Encrypted";
                    document.getElementById('sync-dot').className = "w-2 h-2 bg-green-500";
                    document.getElementById('status-icon').className = "w-16 h-16 bg-green-600/10 text-green-500 rounded-3xl flex items-center justify-center border border-green-500/20 shadow-lg";
                });

                hls.on(Hls.Events.ERROR, (e, data) => {
                    if (data.fatal) {
                        log(`Channel Fault: ${data.details}`, 'red-400');
                        hls.recoverMediaError();
                    }
                });
            }
        }

        // Initialize UI
        document.getElementById('nodes-container').innerHTML = NODES.map(node => `
            <button onclick="mountNode(${JSON.stringify(node).replace(/"/g, '&quot;')}, this)" 
                    class="channel-btn w-full text-left p-5 glass border border-white/5 group hover:border-blue-500/30 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center group-hover:bg-blue-600/10 transition-colors">
                        <i class="fa-solid fa-link text-slate-700 group-hover:text-blue-500 text-xs"></i>
                    </div>
                    <span class="text-sm font-bold uppercase tracking-tight group-hover:text-blue-300">${node.name}</span>
                </div>
                <i class="fa-solid fa-chevron-right text-[10px] text-slate-800 group-hover:text-blue-500 group-hover:translate-x-1 transition-all"></i>
            </button>
        `).join('');

        log("Taskmaster Enterprise v12.0 Ready.", "blue-400");
    </script>
</body>
